

<button onclick="window.location.href='index.html'" style="
padding:10px 18px;
background:#0b3a82;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
">

🎪⬅ Back to Home>
</button>

<h1 class="title">Select Emergency Service</h1>
<h2>USING GPS </h2>
<button onclick="sendGPS()" style="
padding:15px 25px;
background:red;
color:rgb(245, 236, 236);
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
">
🚨 Send Emergency GPS
</button>

<p id="status"></p>

<script>

function sendGPS(){

document.getElementById("status").innerHTML =
"📍 Getting location...";

navigator.geolocation.getCurrentPosition(success,error);

function success(position){

let data =
JSON.parse(localStorage.getItem("gpsOnly")) || [];

data.push({

time:new Date().toLocaleString(),

lat:position.coords.latitude,

lon:position.coords.longitude

});

localStorage.setItem(
"gpsOnly",
JSON.stringify(data)
);

document.getElementById("status").innerHTML =
"✅ Emergency Sent Successfully!";

alert("🚑 GPS Sent To Admin");

}

function error(){

alert("❌ GPS access denied");

}

}

</script>


<style>
.title{
text-align:center;
color:white;
background:#0b3a82;
padding:15px;
border-radius:10px;
width:fit-content;
margin:20px auto;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
body{
font-family:Arial;
text-align:center;
margin-top:60px;
background:#f4f7fb;
}

/* BUTTON */
.call-btn{
padding:15px 25px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);

justify-content:center;
align-items:center;
}

/* BOX */
.popup-box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:320px;
animation:pop 0.3s;
}

@keyframes pop{
from{
transform:scale(0.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}
}

/* LOGOS */
.logo-box{
display:flex;
justify-content:center;
gap:20px;
margin:20px 0;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #ddd;
object-fit:cover;
}

/* CALL BUTTON */
.real-call{
padding:12px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* CANCEL */
.cancel{
padding:12px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-left:10px;
}

</style>

</head>

<body>

<h2>🚑 Emergency Ambulance</h2>

<button class="call-btn" onclick="openPopup()">
🚑 Call Ambulance
</button>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="popup-box">

<h2>📞 Calling Ambulance...</h2>

<div class="logo-box">

<!-- LOGO 1 -->
<img src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png"
class="logo">

<!-- LOGO 2 -->
<img src="https://cdn-icons-png.flaticon.com/512/4320/4320371.png"
class="logo">

</div>

<p>Please wait while connecting...</p>

<button class="real-call" onclick="sendEmergency()">
📞 Continue
</button>

<button class="cancel" onclick="closePopup()">
❌ Cancel
</button>

</div>

</div>

<script>

// OPEN POPUP
function openPopup(){

document.getElementById("popup").style.display="flex";

}

// CLOSE
function closePopup(){

document.getElementById("popup").style.display="none";

}

// SEND EMERGENCY
function sendEmergency(){

navigator.geolocation.getCurrentPosition(function(position){

let data =
JSON.parse(localStorage.getItem("ambulanceRequests")) || [];

data.push({

time:new Date().toLocaleString(),

lat:position.coords.latitude,

lon:position.coords.longitude,

status:"Waiting"

});

localStorage.setItem(
"ambulanceRequests",
JSON.stringify(data)
);

alert("🚑 Ambulance Called Successfully!");

closePopup();

});

}

</script>

</body>
</html>
