<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Stock</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
color:#007bff;
margin-bottom:20px;
}

.search-box{
margin-bottom:20px;
text-align:center;
}

.search-box input{
width:300px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

table th{
background:#007bff;
color:white;
padding:15px;
}

table td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

table tr:hover{
background:#f1f1f1;
}

.available{
color:green;
font-weight:bold;
}

.low{
color:red;
font-weight:bold;
}

.expired{
color:orange;
font-weight:bold;
}

.add-btn{
margin-top:20px;
background:#007bff;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.add-btn:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h1>💊 Pharmacy Stock Management</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search medicine...">
</div>

<table id="medicineTable">

<tr>
<th>Medicine</th>
<th>Quantity</th>
<th>Price</th>
<th>Expiry Date</th>
<th>Status</th>
</tr>

<tr>
<td>Paracetamol</td>
<td>120</td>
<td>500 RWF</td>
<td>2027-02-10</td>
<td class="available">Available</td>
</tr>

<tr>
<td>Amoxicillin</td>
<td>5</td>
<td>1200 RWF</td>
<td>2026-01-01</td>
<td class="low">Low Stock</td>
</tr>

<tr>
<td>Cough Syrup</td>
<td>0</td>
<td>3500 RWF</td>
<td>2025-10-12</td>
<td class="expired">Out of Stock</td>
</tr>

<tr>
<td>Vitamin C</td>
<td>40</td>
<td>800 RWF</td>
<td>2026-08-21</td>
<td class="available">Available</td>
</tr>

</table>

<button class="add-btn">➕ Add Medicine</button>

</div>

<script>

document.getElementById("searchInput").addEventListener("keyup", function(){

let value = this.value.toLowerCase();

let rows = document.querySelectorAll("#medicineTable tr");

rows.forEach((row,index)=>{

if(index===0) return;

row.style.display = row.innerText.toLowerCase().includes(value)
? ""
: "none";

});

});

</script>

</body>
</html>
