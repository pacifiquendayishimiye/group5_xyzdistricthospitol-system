<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Hospital System</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#0066cc;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#004a99;
}

.link{
margin-top:10px;
display:block;
color:#0066cc;
cursor:pointer;
font-size:14px;
}

.hidden{display:none;}

.back-btn {
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  background:linear-gradient(135deg,#0077b6,#00b4d8);
  color:white;
  text-decoration:none;
  border-radius:30px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Hospital System</h2>

<!-- LOGIN -->
<div id="loginForm">
<input type="text" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
<span class="link" onclick="showSignup()">Create Account</span>
<span class="link" onclick="showForgot()">Forgot Password?</span>
</div>

<!-- SIGNUP -->
<div id="signupForm" class="hidden">
<input type="text" id="newEmail" placeholder="New Email">
<input type="password" id="newPass" placeholder="New Password">
<button onclick="signup()">Sign Up</button>
<span class="link" onclick="showLogin()">Back to Login</span>
</div>

<!-- FORGOT PASSWORD -->
<div id="forgotForm" class="hidden">
<input type="text" id="forgotEmail" placeholder="Enter Email">
<button onclick="resetPassword()">Reset Password</button>
<span class="link" onclick="showLogin()">Back to Login</span>
</div>

<a href="index.html" class="back-btn">⬅ Back to Home</a>

</div>

<script>

/* ===== SHOW / HIDE FORMS ===== */
function showLogin(){
 document.getElementById("loginForm").classList.remove("hidden");
 document.getElementById("signupForm").classList.add("hidden");
 document.getElementById("forgotForm").classList.add("hidden");
}

function showSignup(){
 document.getElementById("loginForm").classList.add("hidden");
 document.getElementById("signupForm").classList.remove("hidden");
 document.getElementById("forgotForm").classList.add("hidden");
}

function showForgot(){
 document.getElementById("loginForm").classList.add("hidden");
 document.getElementById("signupForm").classList.add("hidden");
 document.getElementById("forgotForm").classList.remove("hidden");
}

/* ===== SIGN UP (IMPROVED) ===== */
function signup(){
 let email = document.getElementById("newEmail").value.trim();
 let pass = document.getElementById("newPass").value.trim();

 if(!email || !pass){
   alert("Please fill all fields");
   return;
 }

 if(!email.includes("@") || !email.includes(".")){
   alert("Please enter a valid email");
   return;
 }

 if(pass.length < 4){
   alert("Password must be at least 4 characters");
   return;
 }

 if(localStorage.getItem("user_"+email)){
   alert("Account already exists! Please login.");
   showLogin();
   return;
 }

 localStorage.setItem("user_"+email, pass);

 alert("Account created successfully!");

 document.getElementById("newEmail").value = "";
 document.getElementById("newPass").value = "";

 showLogin();
}

/* ===== LOGIN (FIXED) ===== */
function login(){
 let email = document.getElementById("loginEmail").value.trim();
 let pass = document.getElementById("loginPass").value.trim();

 if(!email || !pass){
   alert("Please fill all fields");
   return;
 }

 let storedPass = localStorage.getItem("user_"+email);

 // ADMIN LOGIN
 if(email === "admin@gmail.com" && pass === "1234"){
   localStorage.setItem("role","admin");
   window.location.href="admin.html";
   return;
 }

 if(storedPass === null){
   alert("User not found. Please sign up first.");
   return;
 }

 if(storedPass === pass){
   localStorage.setItem("role","user");
   localStorage.setItem("currentUser", email);

   alert("Login successful!");
   window.location.href="APPOINTMENTS.html";
 } else {
   alert("Wrong password!");
 }
}

/* ===== RESET PASSWORD ===== */
function resetPassword(){
 let email = document.getElementById("forgotEmail").value.trim();

 if(!email){
   alert("Enter email");
   return;
 }

 if(localStorage.getItem("user_"+email)){
   let newPass = prompt("Enter new password:");

   if(newPass && newPass.length >= 4){
     localStorage.setItem("user_"+email, newPass);
     alert("Password updated successfully");
     showLogin();
   } else {
     alert("Password too short");
   }
 } else {
   alert("User not found");
 }
}

</script>

</body>
</html>
